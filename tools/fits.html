<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FITS Header Parser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0;
            margin: 0;
        }

        body.dragover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .container {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 0;
            box-shadow: none;
            overflow: auto;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 20px;
            margin-bottom: 0;
        }

        .header p {
            font-size: 12px;
            opacity: 0.8;
            margin: 0;
            display: none;
        }

        .content {
            padding: 0;
            flex: 1;
            overflow: hidden;
            display: flex;
            gap: 0;
        }

        .pane-left {
            flex: 0 0 50%;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 15px 20px;
            border-right: 1px solid #e0e0e0;
        }

        .pane-right {
            flex: 0 0 50%;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 15px 20px;
            background: #fafafa;
        }

        .file-controls {
            position: sticky;
            top: 0;
            background: white;
            padding-bottom: 10px;
            margin-bottom: 10px;
            z-index: 10;
            border-bottom: 1px solid #e0e0e0;
        }

        .drop-zone {
            display: none;
        }

        input[type="file"] {
            display: none;
        }

        .file-input-label {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s ease;
            font-size: 14px;
        }

        .file-input-label:hover {
            background: #764ba2;
        }

        .file-list {
            display: none;
        }

        .file-list h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .file-item {
            background: #f8f9ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-name {
            font-weight: 500;
            color: #333;
        }

        .file-status {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            display: none;
        }

        .results h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
            display: none;
        }

        .result-item {
            background: #f8f9ff;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 8px;
            border-left: 4px solid #667eea;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .result-header:hover {
            opacity: 0.8;
        }

        .result-title {
            font-weight: 600;
            color: #333;
            font-size: 13px;
        }

        .result-toggle {
            color: #667eea;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.3s ease;
        }

        .result-toggle.open {
            transform: rotate(180deg);
        }

        .result-content {
            display: none;
            margin-top: 8px;
            max-height: 600px;
            overflow-y: auto;
        }

        .result-content.open {
            display: block;
        }

        .canvas-container {
            background: white;
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            border: 1px solid #e0e0e0;
        }

        .canvas-container canvas {
            border: 1px solid #ddd;
            max-width: 100%;
            height: auto;
            display: block;
        }

        .render-progress {
            width: 100%;
            height: 14px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin: 4px 0;
        }

        .render-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 9px;
            font-weight: 600;
        }

        .hdu-info {
            background: white;
            border-radius: 4px;
            padding: 8px;
            margin-bottom: 6px;
            font-size: 11px;
            color: #555;
        }

        .hdu-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            padding-bottom: 6px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 12px;
        }

        .header-pair {
            display: flex;
            padding: 2px 0;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 10px;
            line-height: 1.3;
        }

        .header-key {
            color: #667eea;
            font-weight: 600;
            min-width: 80px;
            flex-shrink: 0;
        }

        .header-value {
            color: #333;
            flex-grow: 1;
            word-break: break-all;
            margin-right: 6px;
        }

        .header-comment {
            color: #999;
            font-style: italic;
        }

        .error-item {
            background: #ffe9e9;
            border-left: 4px solid #ff6b6b;
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 4px;
        }

        .error-title {
            font-weight: 600;
            color: #c92a2a;
            margin-bottom: 3px;
            font-size: 12px;
        }

        .error-message {
            color: #a61e4d;
            font-size: 11px;
        }

        .success-item {
            background: #e7f5f0;
            border-left: 4px solid #20c997;
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 4px;
        }

        .success-title {
            font-weight: 600;
            color: #0b7285;
            margin-bottom: 3px;
            font-size: 12px;
        }

        .actions {
            display: flex;
            gap: 8px;
            justify-content: flex-start;
            margin: 10px 0;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #764ba2;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #e9ecf1;
            color: #333;
        }

        .btn-secondary:hover {
            background: #dee2e6;
        }

        .progress-container {
            padding: 10px;
            background: #f8f9ff;
            border-radius: 6px;
            border-left: 4px solid #667eea;
            display: none;
            margin: 10px 0;
        }

        .progress-container.active {
            display: block;
        }

        .progress-label {
            font-size: 12px;
            color: #333;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .progress-bar-container {
            width: 100%;
            height: 16px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: 600;
            min-width: 40px;
        }

        @media (max-width: 900px) {
            .pane-left,
            .pane-right {
                flex: 0 0 50%;
            }

            .pane-left {
                border-right: 1px solid #e0e0e0;
                border-bottom: none;
            }
        }

        @media (max-width: 600px) {
            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .content {
                padding: 0;
                flex-direction: column;
            }

            .pane-left,
            .pane-right {
                flex: 1;
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
            }

            .pane-right {
                border-bottom: none;
            }

            .drop-zone {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔬 FITS Header Parser</h1>
            <p>Drag and drop your FITS files to parse headers</p>
        </div>

        <div class="content">
            <!-- Left Pane: Headers -->
            <div class="pane-left">
                <div class="file-controls">
                    <div style="display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; align-items: center;">
                        <label class="file-input-label">
                            Choose Files
                            <input type="file" id="fileInput" multiple accept=".fits,.fit,.fts">
                        </label>
                        
                        <div style="display: flex; align-items: center; gap: 6px; font-size: 13px;">
                            <label for="normSelect" style="color: #667eea; font-weight: 600;">Normalization:</label>
                            <select id="normSelect" style="padding: 6px 10px; border: 2px solid #667eea; border-radius: 4px; background: white; font-size: 13px; cursor: pointer;">
                                <option value="linear">Linear</option>
                                <option value="asinh" selected>Asinh</option>
                                <option value="log">Logarithmic</option>
                            </select>
                        </div>
                        
                        <div id="asinhControls" style="display: flex; align-items: center; gap: 6px; font-size: 12px;">
                            <label for="asinhScale" style="color: #666;">Scale:</label>
                            <input type="range" id="asinhScale" min="0.01" max="10" step="0.01" value="1" style="width: 100px;">
                            <span id="asinhScaleValue" style="color: #333; font-weight: 600; min-width: 40px;">1.00</span>
                        </div>
                    </div>

                    <div class="file-list" id="fileList">
                        <h3>Queued Files:</h3>
                        <div id="fileItems"></div>
                    </div>

                    <div class="actions" id="actions" style="display: none;">
                        <button class="btn-primary" id="parseBtn">Parse Files</button>
                        <button class="btn-secondary" id="clearBtn">Clear</button>
                    </div>

                    <div class="progress-container" id="progressContainer">
                        <div class="progress-label" id="progressLabel">Processing...</div>
                        <div class="progress-bar-container">
                            <div class="progress-bar-fill" id="progressBar" style="width: 0%">0%</div>
                        </div>
                    </div>
                </div>

                <div class="results" id="results">
                    <h3>Parse Results:</h3>
                    <div id="resultItems"></div>
                </div>
            </div>

            <!-- Right Pane: Images -->
            <div class="pane-right" id="imagePane">
                <div style="color: #999; text-align: center; padding: 40px 20px; font-size: 14px;">
                    Images will appear here
                </div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const fileItems = document.getElementById('fileItems');
        const actions = document.getElementById('actions');
        const parseBtn = document.getElementById('parseBtn');
        const clearBtn = document.getElementById('clearBtn');
        const results = document.getElementById('results');
        const resultItems = document.getElementById('resultItems');
        const progressContainer = document.getElementById('progressContainer');
        const progressLabel = document.getElementById('progressLabel');
        const progressBar = document.getElementById('progressBar');
        const imagePane = document.getElementById('imagePane');

        let selectedFiles = [];
        const CHUNK_SIZE = 10 * 1024 * 1024; // 10MB chunks for reading
        let currentFileIndex = 0;
        
        // Store active renderers for fast re-rendering
        let activeRenderers = [];

        // Global helper to extract value from either plain number or {value, comment} object
        const getValue = (val) => {
            if (val === undefined) return undefined;
            return typeof val === 'object' && val !== null ? val.value : val;
        };

        // Parse FITS file incrementally: get headers fast, load pixel data in background
        async function parseFileIncrementally(file, onPixelDataProgress) {
            const startTime = performance.now();
            console.log(`[FITS] Starting parseFileIncrementally for ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`);
            
            const fileSize = file.size;
            let headerBuffer = new Uint8Array(0);
            let headersParsed = false;
            let parser = null;
            let result = null;

            // First pass: read chunks until headers are complete (usually < 100MB)
            for (let offset = 0; offset < fileSize && !headersParsed; offset += CHUNK_SIZE) {
                const chunk = await file.slice(offset, Math.min(offset + CHUNK_SIZE, fileSize)).arrayBuffer();
                const chunkArray = new Uint8Array(chunk);
                
                // Append to header buffer
                const newBuffer = new Uint8Array(headerBuffer.length + chunkArray.length);
                newBuffer.set(headerBuffer);
                newBuffer.set(chunkArray, headerBuffer.length);
                headerBuffer = newBuffer;

                // Try to parse headers
                parser = new FITSParser(headerBuffer);
                result = parser.parse();
                
                // If parsing succeeded and we have HDUs, headers are complete
                if (result.success && result.hdus.length > 0) {
                    headersParsed = true;
                    const parseTime = performance.now() - startTime;
                    console.log(`[FITS] Headers parsed in ${parseTime.toFixed(1)}ms (${(headerBuffer.length / 1024 / 1024).toFixed(2)} MB)`);
                }
            }

            if (!result || !result.success) {
                return { success: false, error: 'Failed to parse FITS headers' };
            }

            // Store file reference for on-demand pixel data loading
            result.file = file;
            result.fileSize = fileSize;
            result.headerBuffer = headerBuffer;  // Pass the header buffer to avoid re-reading

            // Load remaining pixel data in background (fire-and-forget)
            if (fileSize > headerBuffer.length) {
                // Fire without awaiting to return immediately to UI
                console.log(`[FITS] Starting background pixel load (${((fileSize - headerBuffer.length) / 1024 / 1024).toFixed(2)} MB remaining)`);
                loadPixelDataInBackground(file, result, headerBuffer.length, onPixelDataProgress).catch(err => {
                    console.error('Background pixel loading error:', err);
                });
            }

            return result;
        }

        // Load remaining pixel data in background without blocking UI
        async function loadPixelDataInBackground(file, result, headerSize, onProgress) {
            const startTime = performance.now();
            console.log(`[BG-LOAD] Background loading started at ${startTime.toFixed(0)}`);
            
            const fileSize = file.size;
            let fullBuffer = result.headerBuffer;
            let loaded = headerSize;

            // Set fullBuffer immediately so rendering can start using what's available
            result.fullBuffer = fullBuffer;
            console.log(`[BG-LOAD] Initial fullBuffer set: ${(fullBuffer.length / 1024 / 1024).toFixed(2)} MB`);

            // Immediately report that we're starting to load
            if (onProgress) {
                onProgress(loaded / fileSize);
            }

            let chunkCount = 0;
            for (let offset = headerSize; offset < fileSize; offset += CHUNK_SIZE) {
                const end = Math.min(offset + CHUNK_SIZE, fileSize);
                const chunk = new Uint8Array(await file.slice(offset, end).arrayBuffer());
                
                // Append chunk to full buffer
                const newBuffer = new Uint8Array(fullBuffer.length + chunk.length);
                newBuffer.set(fullBuffer);
                newBuffer.set(chunk, fullBuffer.length);
                fullBuffer = newBuffer;
                
                // Update result.fullBuffer immediately so rendering can use new data
                result.fullBuffer = fullBuffer;
                const elapsed = performance.now() - startTime;
//                console.log(`[BG-LOAD] ${elapsed.toFixed(0)}ms: Loaded to ${end / 1024 / 1024}MB / ${fileSize / 1024 / 1024}MB (fullBuffer: ${(fullBuffer.length / 1024 / 1024).toFixed(2)} MB)`);

                loaded = end;
                chunkCount++;
                
                // Report progress
                if (onProgress) {
                    onProgress((loaded / fileSize));
                }

                // Yield to browser less frequently - every 50MB (5 chunks) instead of every 10MB
                // This reduces overhead while still allowing UI updates
                if (chunkCount % 5 === 0) {
                    await new Promise(resolve => setTimeout(resolve, 0));
                }
            }

            // Final update
            result.pixelDataReady = true;
            const totalTime = performance.now() - startTime;
            console.log(`[BG-LOAD] Completed in ${totalTime.toFixed(1)}ms (${(fullBuffer.length / 1024 / 1024).toFixed(2)} MB)`);
        }

        // Get pixel data for rendering (either cached or load-on-demand)
        // NOTE: The renderer can handle partial pixel data - it fills missing pixels with 0
        async function getPixelDataForRendering(file, result, hdu) {
            // Return immediately - let renderer handle progressive loading
            console.log(`[RENDER] Returning result object for progressive rendering`);
            return result;
        }

        // FITS Parser Implementation
        class FITSParser {
            constructor(arrayBuffer) {
                this.buffer = new Uint8Array(arrayBuffer);
                this.offset = 0;
                this.hdus = [];
            }

            parse() {
                try {
                    let hduCount = 0;
                    while (this.offset < this.buffer.length && hduCount < 100) {
                        const hdu = this.parseHDU();
                        if (!hdu) {
                            break;
                        }
                        hduCount++;
                        this.hdus.push(hdu);
                    }
                    return { success: true, hdus: this.hdus };
                } catch (err) {
                    return { success: false, error: err.message };
                }
            }

            parseHDU() {
                if (this.offset + 80 > this.buffer.length) {
                    return null;
                }

                // Peek at first keyword to validate this is a real HDU
                const peekLine = this.buffer.slice(this.offset, this.offset + 80);
                const peekText = new TextDecoder().decode(peekLine).substring(0, 8).trim();
                
                // Valid first keywords for FITS HDUs
                const validFirstKeywords = ['SIMPLE', 'XTENSION'];
                
                if (this.hdus.length === 0) {
                    // First HDU must start with SIMPLE
                    if (peekText !== 'SIMPLE') {
                        return null;
                    }
                } else {
                    // Subsequent HDUs must start with XTENSION
                    if (peekText !== 'XTENSION') {
                        return null;
                    }
                }

                const header = {};
                let hduIndex = this.hdus.length;
                let dataSize = 0;
                const dataOffset = this.offset;
                let recordCount = 0;

                // Parse header records
                while (this.offset + 80 <= this.buffer.length) {
                    const record = this.readRecord();
                    recordCount++;
                    
                    if (record.keyword === 'END') {
                        // Align to 2880-byte boundary
                        this.alignTo2880();
                        break;
                    }

                    if (record.keyword && record.keyword !== 'END') {
                        // Avoid duplicate keywords
                        if (!header[record.keyword]) {
                            header[record.keyword] = record.value !== undefined ? 
                                (record.comment ? { value: record.value, comment: record.comment } : record.value) :
                                true;
                        }
                    }

                    // Calculate data size from NAXIS and BITPIX
                    if (record.keyword === 'BITPIX' && header['NAXIS'] !== undefined) {
                        dataSize = this.calculateDataSize(header);
                    }
                    if (record.keyword === 'NAXIS' || record.keyword?.startsWith('NAXIS')) {
                        if (this.hasAllNAxis(header)) {
                            dataSize = this.calculateDataSize(header);
                        }
                    }
                }

                // Store where pixel data starts (right after header alignment)
                let rawDataOffset = this.offset;

                // Skip data section
                if (dataSize > 0) {
                    // Align data size to 2880-byte boundary
                    const alignedDataSize = Math.ceil(dataSize / 2880) * 2880;
                    this.offset += alignedDataSize;
                }

                return {
                    hdu: hduIndex,
                    header: header,
                    dataSize: dataSize,
                    dataOffset: rawDataOffset,  // Position where pixel data starts in buffer
                    rawDataOffset: rawDataOffset  // Position where pixel data starts in buffer
                };
            }

            readRecord() {
                const record = {
                    keyword: '',
                    value: undefined,
                    comment: ''
                };

                const line = this.readBytes(80);
                const text = new TextDecoder().decode(line).trimEnd();

                // Special case: END keyword is just 3 characters, valid on its own
                if (text === 'END') {
                    record.keyword = 'END';
                    return record;
                }

                if (text.length < 8) {
                    return record;
                }

                // Extract keyword
                record.keyword = text.substring(0, 8).trim();
                
                // Detect binary data: keywords like "555555" or short repeated chars
                if (record.keyword.length > 0) {
                    const firstChar = record.keyword[0];
                    const isRepeated = record.keyword.split('').every(c => c === firstChar);
                    if (isRepeated) {
                        record.keyword = 'END';
                        return record;
                    }
                }
                
                // Validate that keyword looks like a valid FITS header keyword
                // Keywords should be alphanumeric + some special chars
                if (!/^[A-Z0-9_\-]+$/.test(record.keyword) && record.keyword.length > 0) {
                    // Mark this as END to stop parsing
                    record.keyword = 'END';
                    return record;
                }

                if (text.length <= 8) return record;

                // Check for value indicator
                if (text[8] !== '=') return record;

                // Extract value and comment
                let valueEnd = text.indexOf('/');
                if (valueEnd === -1) valueEnd = text.length;

                const valueStr = text.substring(9, valueEnd).trim();
                if (valueEnd < text.length) {
                    record.comment = text.substring(valueEnd + 1).trim();
                }

                // Parse value
                if (valueStr.length === 0) {
                    record.value = null;
                } else if (valueStr[0] === "'") {
                    // String value
                    const endQuote = valueStr.lastIndexOf("'");
                    record.value = valueStr.substring(1, endQuote);
                } else if (valueStr === 'T' || valueStr === 'F') {
                    // Logical value
                    record.value = valueStr === 'T';
                } else if (!isNaN(valueStr) && valueStr !== '') {
                    // Numeric value
                    record.value = valueStr.includes('.') ? parseFloat(valueStr) : parseInt(valueStr);
                } else {
                    record.value = valueStr;
                }

                return record;
            }

            readBytes(count) {
                const bytes = this.buffer.slice(this.offset, this.offset + count);
                this.offset += count;
                return bytes;
            }

            alignTo2880() {
                const remainder = this.offset % 2880;
                if (remainder !== 0) {
                    this.offset += 2880 - remainder;
                }
            }

            calculateDataSize(header) {
                const bitpix = getValue(header['BITPIX']);
                const naxis = getValue(header['NAXIS']);

                if (bitpix === undefined || naxis === undefined) {
                    console.warn('calculateDataSize: Missing BITPIX or NAXIS', {bitpix, naxis});
                    return 0;
                }

                const bytesPerPixel = Math.abs(bitpix) / 8;
                let totalPixels = 1;

                for (let i = 1; i <= naxis; i++) {
                    const axis = getValue(header[`NAXIS${i}`]);
                    if (axis === undefined) {
                        return 0;
                    }
                    totalPixels *= axis;
                }

                const result = bytesPerPixel * totalPixels;
                return result;
            }

            hasAllNAxis(header) {
                const naxis = getValue(header['NAXIS']);
                if (naxis === undefined || typeof naxis !== 'number') return false;
                
                for (let i = 1; i <= naxis; i++) {
                    const axisVal = getValue(header[`NAXIS${i}`]);
                    if (axisVal === undefined || typeof axisVal !== 'number') return false;
                }
                return true;
            }
        }

        // Worker Pool for parallel resampling
        class WorkerPool {
            constructor(workerScript, poolSize = 8) {
                this.workers = [];
                this.taskQueue = [];
                this.activeWorkers = 0;
                
                // Create worker pool
                for (let i = 0; i < poolSize; i++) {
                    const worker = new Worker(workerScript);
                    worker.idle = true;
                    worker.id = i;
                    
                    worker.onmessage = (e) => {
                        const { resolve, reject } = worker.currentTask;
                        worker.currentTask = null;
                        worker.idle = true;
                        this.activeWorkers--;
                        
                        if (e.data.error) {
                            reject(new Error(e.data.error));
                        } else {
                            resolve(e.data);
                        }
                        
                        this.processQueue();
                    };
                    
                    worker.onerror = (error) => {
                        if (worker.currentTask) {
                            const { reject } = worker.currentTask;
                            worker.currentTask = null;
                            worker.idle = true;
                            this.activeWorkers--;
                            reject(error);
                            this.processQueue();
                        }
                    };
                    
                    this.workers.push(worker);
                }
            }
            
            async execute(data) {
                return new Promise((resolve, reject) => {
                    this.taskQueue.push({ data, resolve, reject });
                    this.processQueue();
                });
            }
            
            processQueue() {
                while (this.taskQueue.length > 0) {
                    const idleWorker = this.workers.find(w => w.idle);
                    if (!idleWorker) break;
                    
                    const task = this.taskQueue.shift();
                    idleWorker.idle = false;
                    idleWorker.currentTask = task;
                    this.activeWorkers++;
                    idleWorker.postMessage(task.data);
                }
            }
            
            async waitForAll() {
                // Wait for all active workers to complete
                while (this.activeWorkers > 0 || this.taskQueue.length > 0) {
                    await new Promise(resolve => setTimeout(resolve, 10));
                }
            }
            
            terminate() {
                this.workers.forEach(w => w.terminate());
                this.workers = [];
                this.taskQueue = [];
            }
        }

        // FITS Image Renderer - Progressive resampling to avoid timeouts
        class FITSImageRenderer {
            constructor(hdu, resultOrBuffer, domContainer = null, normalization = 'asinh', asinhScale = 1.0) {
                this.hdu = hdu;
                // Support both result object (progressive) and buffer (fallback)
                this.result = (resultOrBuffer && resultOrBuffer.fullBuffer) ? resultOrBuffer : null;
                this.buffer = this.result ? this.result.fullBuffer : new Uint8Array(resultOrBuffer);
                this.canvas = null;
                this.progress = 0;
                this.domContainer = domContainer;
                this.workerPool = null;
                this.workerScriptUrl = null;
                this.normalization = normalization;
                this.asinhScale = asinhScale;
                // Cache for fast re-rendering
                this.rowDataCache = null;
                this.globalMin = null;
                this.globalMax = null;
                this.reducedWidth = null;
                this.reducedHeight = null;
            }
            
            // Normalization functions
            normalize(value, min, max) {
                const range = max - min || 1;
                switch (this.normalization) {
                    case 'asinh':
                        return this.normalizeAsinh(value, min, max, this.asinhScale);
                    case 'log':
                        return this.normalizeLog(value, min, max);
                    case 'linear':
                    default:
                        return ((value - min) / range);
                }
            }
            
            normalizeAsinh(value, min, max, scale = 1.0) {
                // Asinh (inverse hyperbolic sine) normalization
                // Good for astronomical images: linear for faint features, log for bright
                const range = max - min || 1;
                const normalized = (value - min) / range; // [0, 1]
                const scaled = normalized * scale;
                
                // Apply asinh: asinh(scaled) / asinh(scale) maps [0, scale] to [0, 1]
                const asinhMax = Math.asinh(scale);
                const asinhValue = Math.asinh(scaled);
                return asinhMax > 0 ? asinhValue / asinhMax : 0;
            }
            
            normalizeLog(value, min, max) {
                // Logarithmic normalization - reduced effect to avoid over-brightening
                const range = max - min || 1;
                const normalized = (value - min) / range; // [0, 1]
                // Use log1p with smaller multiplier (9 instead of 999) for gentler curve
                return Math.log1p(normalized * 9) / Math.log1p(9); // maps [0, 1] to [0, 1] logarithmically
            }
            
            // Create worker script as a blob
            createWorkerScript() {
                const workerCode = `
                    self.onmessage = function(e) {
                        const { buffer, scale, reducedWidth, srcWidth, rowIndex } = e.data;
                        
                        try {
                            const avgRowData = new Float32Array(reducedWidth);
                            let localMin = Infinity;
                            let localMax = -Infinity;
                            
                            const bufferLength = buffer.length;
                            
                            // Process all pixels
                            for (let x = 0; x < reducedWidth; x++) {
                                let sum = 0, count = 0;
                                const srcXBase = x * scale;
                                const srcXEnd = Math.min(srcXBase + scale, srcWidth);
                                
                                // Average across all rows in buffer
                                for (let dy = 0; dy < bufferLength; dy++) {
                                    const row = buffer[dy];
                                    for (let srcX = srcXBase; srcX < srcXEnd; srcX++) {
                                        const pixel = row[srcX];
                                        if (isFinite(pixel)) {
                                            sum += pixel;
                                            count++;
                                        }
                                    }
                                }
                                
                                const avg = count > 0 ? sum / count : 0;
                                avgRowData[x] = avg;
                                
                                // Update local min/max
                                if (avg < localMin) localMin = avg;
                                if (avg > localMax) localMax = avg;
                            }
                            
                            // Transfer back the result
                            self.postMessage({
                                avgRowData: avgRowData,
                                localMin: localMin,
                                localMax: localMax,
                                rowIndex: rowIndex
                            }, [avgRowData.buffer]);
                            
                        } catch (error) {
                            self.postMessage({ error: error.message });
                        }
                    };
                `;
                
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                return URL.createObjectURL(blob);
            }

            async renderAsync(onProgress) {
                try {
                    const header = this.hdu.header;
                    const bitpix = getValue(header['BITPIX']);
                    const naxis1 = getValue(header['NAXIS1']);
                    const naxis2 = getValue(header['NAXIS2']);
                    
                    if (!bitpix || !naxis1 || !naxis2) {
                        return null;
                    }

                    // Progressive rendering: read and render scanlines incrementally
                    return await this.renderProgressiveAsync(bitpix, naxis1, naxis2, onProgress);
                } catch (err) {
                    console.error('renderAsync error:', err);
                    return null;
                }
            }

            async renderProgressiveAsync(bitpix, width, height, onProgress) {
                const scale = (width * height > 10000000) ? 8 : 4;
                const reducedWidth = Math.ceil(width / scale);
                const reducedHeight = Math.ceil(height / scale);

                console.log(`[RENDERER] Progressive rendering: ${width}×${height} → ${reducedWidth}×${reducedHeight} (scale ${scale}x)`);

                // Create canvas with dark yellow pixels for debugging
                this.canvas = document.createElement('canvas');
                this.canvas.width = reducedWidth;
                this.canvas.height = reducedHeight;
                const ctx = this.canvas.getContext('2d');
                const imageData = ctx.createImageData(reducedWidth, reducedHeight);
                
                // Fill with dark yellow initially (to clearly see unrendered areas)
                for (let i = 0; i < imageData.data.length; i += 4) {
                    imageData.data[i] = 180;     // R (dark yellow)
                    imageData.data[i + 1] = 140; // G
                    imageData.data[i + 2] = 0;   // B
                    imageData.data[i + 3] = 255; // A
                }
                ctx.putImageData(imageData, 0, 0);

                // If we have a DOM container, add canvas immediately so updates are visible
                if (this.domContainer) {
                    this.domContainer.innerHTML = '';
                    const label = document.createElement('div');
                    label.style.cssText = 'font-size: 12px; color: #666; margin-bottom: 8px; text-align: center;';
                    label.textContent = `Rendering: ${reducedWidth}×${reducedHeight}...`;
                    this.domContainer.appendChild(label);
                    
                    const canvasWrapper = document.createElement('div');
                    canvasWrapper.style.cssText = 'display: flex; justify-content: center; flex-grow: 1;';
                    canvasWrapper.appendChild(this.canvas);
                    this.domContainer.appendChild(canvasWrapper);
                    
                    this.domContainer.style.display = 'flex';
                    this.domContainer.style.flexDirection = 'column';
                }

                // Read and render scanlines progressively
                await this.readAndRenderProgressively(bitpix, width, height, scale, ctx, onProgress);
                
                return this.canvas;
            }

            async readAndRenderProgressively(bitpix, width, height, scale, ctx, onProgress) {
                // PERFORMANCE OPTIMIZATIONS:
                // 1. Web Worker Pool for parallel resampling (8 workers)
                // 2. Render every row progressively (no gaps) but with current normalization
                // 3. Fill any gaps with duplicated data to avoid yellow background showing
                // 4. Reduced async yields from every row to every 100 rows  
                // 5. Exponential backoff for data waiting (1ms->2ms->4ms...->50ms)
                // 6. Single ImageData allocation for final render instead of per-row
                // 7. Less frequent progress updates (every 100 rows or 10% intervals)
                // 8. Final re-render pass with global normalization for consistency
                
                const startTime = performance.now();
                const bytesPerPixel = Math.abs(bitpix) / 8;
                const bytesPerScanline = width * bytesPerPixel;
                const reducedWidth = Math.ceil(width / scale);
                const reducedHeight = Math.ceil(height / scale);
                
                // Initialize worker pool for parallel processing
                if (!this.workerScriptUrl) {
                    this.workerScriptUrl = this.createWorkerScript();
                }
                this.workerPool = new WorkerPool(this.workerScriptUrl, 8);
                
                let offset = this.hdu.rawDataOffset;
                const renderedRows = new Set(); // Track which rows have been rendered
                let batchCount = 0;
                let currentBatchStartRow = 0;
                let currentBatchBuffer = [];
                
                // Track global min/max for consistent normalization across all rows
                let globalMin = Infinity;
                let globalMax = -Infinity;
                const rowDataCache = new Map(); // Store row data for re-rendering with global normalization
                
                // Queue for managing worker results
                const pendingWorkerTasks = [];
                
                console.log(`[RENDERER] Reading and rendering ${height} scanlines with 8 parallel workers...`);
                console.log(`[RENDERER] Canvas dimensions: ${reducedWidth}×${reducedHeight}, scale: ${scale}x`);

                for (let row = 0; row < height; row++) {
                    const scanlineStart = offset + row * bytesPerScanline;
                    const scanlineEnd = scanlineStart + bytesPerScanline;
                    
                    // Wait for this scanline's data - use exponential backoff
                    if (this.buffer.byteLength < scanlineEnd && this.result) {
                        let waitTime = 1; // Start with 1ms
                        let totalWait = 0;
                        
                        while (this.buffer.byteLength < scanlineEnd && this.result) {
                            if (this.result && this.result.fullBuffer) {
                                this.buffer = this.result.fullBuffer;
                            }
                            if (this.buffer.byteLength >= scanlineEnd) break;
                            
                            await new Promise(resolve => setTimeout(resolve, waitTime));
                            totalWait += waitTime;
                            waitTime = Math.min(waitTime * 2, 50); // Exponential backoff up to 50ms
                            
                            if (totalWait > 5000) {
                                console.warn(`[WAIT] Row ${row}: waited ${totalWait}ms for data...`);
                                break; // Don't wait forever
                            }
                        }
                        
                        const bufferOK = this.buffer.byteLength >= scanlineEnd;
                        if (!bufferOK) {
                            console.log(`  [WAIT] Row ${row}: incomplete after ${totalWait}ms, buffer ${this.buffer.byteLength}/${scanlineEnd}`);
                        }
                    }
                    
                    // Read this scanline's pixels
                    const rawScanline = new Float32Array(width);
                    let hasData = true;
                    for (let col = 0; col < width; col++) {
                        const pixelOffset = scanlineStart + col * bytesPerPixel;
                        if (pixelOffset + bytesPerPixel <= this.buffer.byteLength) {
                            rawScanline[col] = this.readPixel(bitpix, pixelOffset);
                        } else {
                            rawScanline[col] = 0;
                            hasData = false;
                        }
                    }
                    
                    // Which batch does this row belong to?
                    const batchIndex = Math.floor(row / scale);
                    const rowInBatch = row % scale;
                    
                    // Start new batch if this is the first row of a batch
                    if (rowInBatch === 0) {
                        currentBatchStartRow = row;
                        currentBatchBuffer = [];
                    }
                    
                    currentBatchBuffer.push(rawScanline);
                    
                    // Check if batch is complete (we have 'scale' rows or we're at the last row)
                    const isEndOfBatch = (rowInBatch === scale - 1) || (row === height - 1);
                    const targetReducedRow = batchIndex;
                    
                    if (isEndOfBatch && currentBatchBuffer.length > 0 && targetReducedRow < reducedHeight) {
                        // Process the batch if we haven't processed this row yet
                        if (!renderedRows.has(targetReducedRow)) {
                            // Submit batch to worker pool for parallel processing
                            const workerTask = this.workerPool.execute({
                                buffer: currentBatchBuffer,
                                scale: scale,
                                reducedWidth: reducedWidth,
                                srcWidth: currentBatchBuffer[0].length,
                                rowIndex: targetReducedRow
                            });
                            
                            // Store the pending task
                            pendingWorkerTasks.push(workerTask.then(result => {
                                // Update global min/max
                                if (result.localMin < globalMin) globalMin = result.localMin;
                                if (result.localMax > globalMax) globalMax = result.localMax;
                                
                                // Convert back to Float32Array from transferred buffer
                                const avgRowData = new Float32Array(result.avgRowData);
                                
                                // Cache the averaged row data
                                rowDataCache.set(result.rowIndex, avgRowData);
                                renderedRows.add(result.rowIndex);
                                
                                // Render this row immediately for progressive display
                                // Use current global min/max (will be re-normalized in final pass)
                                this.renderRowWithNormalization(avgRowData, result.rowIndex, reducedWidth, ctx, 
                                    isFinite(globalMin) ? globalMin : 0, 
                                    isFinite(globalMax) ? globalMax : 1);
                                
                                // If there are gaps above this row (due to out-of-order processing),
                                // fill them with duplicated data to avoid yellow gaps
                                // Only check immediate gaps, not all rows (for performance)
                                if (result.rowIndex > 0) {
                                    // Fill up to 10 rows above if they're missing
                                    const startGap = Math.max(0, result.rowIndex - 10);
                                    for (let gapRow = startGap; gapRow < result.rowIndex; gapRow++) {
                                        if (!renderedRows.has(gapRow) && !rowDataCache.has(gapRow)) {
                                            // Fill gap with current row's data (stretched/duplicated)
                                            this.renderRowWithNormalization(avgRowData, gapRow, reducedWidth, ctx, 
                                                isFinite(globalMin) ? globalMin : 0, 
                                                isFinite(globalMax) ? globalMax : 1);
                                            // Mark as temporary fill (don't add to renderedRows so real data can overwrite)
                                        }
                                    }
                                }
                                
                                return result;
                            }));
                            
                            batchCount++;
                            
                            // Process completed tasks periodically to keep UI responsive
                            // Check every 10 batches or when we have many pending tasks
                            if (batchCount % 10 === 0 || pendingWorkerTasks.length > 16) {
                                // Wait for some tasks to complete
                                const completedTasks = await Promise.race([
                                    Promise.all(pendingWorkerTasks.slice(0, 8)), // Wait for first 8 tasks
                                    new Promise(resolve => setTimeout(resolve, 100)) // Or timeout after 100ms
                                ]);
                                
                                // Remove completed tasks
                                if (Array.isArray(completedTasks)) {
                                    pendingWorkerTasks.splice(0, 8);
                                }
                                
                                // Brief yield to keep UI responsive
                                await new Promise(resolve => setTimeout(resolve, 0));
                            }
                        } else {
                            console.warn(`[RENDERER] Row ${targetReducedRow} already processed, skipping batch at source row ${row}`);
                        }
                        currentBatchBuffer = [];
                    }
                    
                    // Update progress less frequently - every 100 rows or at 10% intervals
                    if (onProgress && (row % 100 === 0 || row % Math.floor(height / 10) === 0)) {
                        this.progress = (row + 1) / height;
                        onProgress(Math.min(this.progress, 0.99), `Processing ${row + 1}/${height}...`);
                    }

                    // Yield very rarely - only every 100 rows to prevent UI freezing
                    // This dramatically speeds up processing
                    if (row % 100 === 0 && row > 0) {
                        await new Promise(resolve => setTimeout(resolve, 0));
                    }
                }
                
                // Wait for all worker tasks to complete before final rendering
                if (pendingWorkerTasks.length > 0) {
                    console.log(`[RENDERER] Waiting for ${pendingWorkerTasks.length} worker tasks to complete...`);
                    await Promise.all(pendingWorkerTasks);
                    console.log(`[RENDERER] All worker tasks completed`);
                }
                
                // Clean up worker pool
                if (this.workerPool) {
                    this.workerPool.terminate();
                    this.workerPool = null;
                }
                
                // Clean up worker script blob URL
                if (this.workerScriptUrl) {
                    URL.revokeObjectURL(this.workerScriptUrl);
                    this.workerScriptUrl = null;
                }
                
                // Final pass: Render all rows with consistent global normalization
                console.log(`[RENDERER] Rendering with global normalization [${globalMin.toFixed(2)}, ${globalMax.toFixed(2)}]`);
                
                if (isFinite(globalMin) && isFinite(globalMax) && rowDataCache.size > 0) {
                    // Create a single ImageData for all rows to avoid repeated allocations
                    const fullImageData = ctx.createImageData(reducedWidth, reducedHeight);
                    const range = globalMax - globalMin || 1;
                    
                    // Render all rows at once into the full image data
                    for (const [rowIndex, rowData] of rowDataCache.entries()) {
                        for (let x = 0; x < reducedWidth; x++) {
                            const value = rowData[x];
                            const normalized01 = this.normalize(value, globalMin, globalMax);
                            const normalized = Math.floor(normalized01 * 255);
                            const clamped = Math.max(0, Math.min(255, normalized));
                            
                            const idx = (rowIndex * reducedWidth + x) * 4;
                            fullImageData.data[idx] = clamped;     // R
                            fullImageData.data[idx + 1] = clamped; // G
                            fullImageData.data[idx + 2] = clamped; // B
                            fullImageData.data[idx + 3] = 255;     // A
                        }
                    }
                    
                    // Put the entire image at once
                    ctx.putImageData(fullImageData, 0, 0);
                }
                
                const elapsed = performance.now() - startTime;
                console.log(`[RENDERER] Progressive rendering completed in ${elapsed.toFixed(0)}ms`);
                console.log(`[RENDERER] Summary: ${batchCount} batches processed, global range: [${globalMin.toFixed(2)}, ${globalMax.toFixed(2)}]`);
                console.log(`[RENDERER] Canvas: ${renderedRows.size}/${reducedHeight} rows rendered`);
                
                // Store cache for fast re-rendering
                this.rowDataCache = rowDataCache;
                this.globalMin = globalMin;
                this.globalMax = globalMax;
                this.reducedWidth = reducedWidth;
                this.reducedHeight = reducedHeight;
                
                // Check for gaps - identify which specific rows were missed
                const missedRows = [];
                for (let i = 0; i < reducedHeight; i++) {
                    if (!renderedRows.has(i)) {
                        missedRows.push(i);
                    }
                }
                
                if (missedRows.length > 0) {
                    console.warn(`[RENDERER] ⚠️ COVERAGE GAP: ${missedRows.length} rows not rendered`);
                    console.warn(`[RENDERER] Missed rows: ${missedRows.join(', ')}`);
                } else {
                    console.log(`[RENDERER] ✓ All ${reducedHeight} canvas rows covered`);
                }
                if (onProgress) {
                    onProgress(1.0, 'Done!');
                }
            }
            
            renderRowWithNormalization(rowData, rowIndex, width, ctx, minVal, maxVal) {
                const imageData = ctx.createImageData(width, 1);
                const range = maxVal - minVal || 1;
                
                for (let x = 0; x < width; x++) {
                    const value = rowData[x];
                    const normalized01 = this.normalize(value, minVal, maxVal);
                    const normalized = Math.floor(normalized01 * 255);
                    const clamped = Math.max(0, Math.min(255, normalized));
                    
                    const idx = x * 4;
                    imageData.data[idx] = clamped;     // R
                    imageData.data[idx + 1] = clamped; // G
                    imageData.data[idx + 2] = clamped; // B
                    imageData.data[idx + 3] = 255;     // A
                }
                
                ctx.putImageData(imageData, 0, rowIndex);
            }
            
            // Fast re-rendering with new normalization settings (uses cached data)
            reRenderWithNormalization(normalization, asinhScale) {
                if (!this.canvas || !this.rowDataCache || !isFinite(this.globalMin) || !isFinite(this.globalMax)) {
                    console.warn('[RENDERER] Cannot re-render: missing cached data');
                    return;
                }
                
                const startTime = performance.now();
                this.normalization = normalization;
                this.asinhScale = asinhScale;
                
                const ctx = this.canvas.getContext('2d');
                const fullImageData = ctx.createImageData(this.reducedWidth, this.reducedHeight);
                
                // Render all rows with new normalization
                for (const [rowIndex, rowData] of this.rowDataCache.entries()) {
                    for (let x = 0; x < this.reducedWidth; x++) {
                        const value = rowData[x];
                        const normalized01 = this.normalize(value, this.globalMin, this.globalMax);
                        const normalized = Math.floor(normalized01 * 255);
                        const clamped = Math.max(0, Math.min(255, normalized));
                        
                        const idx = (rowIndex * this.reducedWidth + x) * 4;
                        fullImageData.data[idx] = clamped;     // R
                        fullImageData.data[idx + 1] = clamped; // G
                        fullImageData.data[idx + 2] = clamped; // B
                        fullImageData.data[idx + 3] = 255;     // A
                    }
                }
                
                ctx.putImageData(fullImageData, 0, 0);
                
                const elapsed = performance.now() - startTime;
                console.log(`[RENDERER] Fast re-render completed in ${elapsed.toFixed(0)}ms (${normalization}, scale: ${asinhScale})`);
            }

            renderReducedScanline(scanlineBuffer, reducedRow, reducedWidth, scale, ctx) {
                const imageData = ctx.createImageData(reducedWidth, 1);
                let minVal = Infinity, maxVal = -Infinity;
                
                // Collect all raw pixels and find min/max for this block
                const allPixels = [];
                for (let scanline of scanlineBuffer) {
                    for (let pixel of scanline) {
                        allPixels.push(pixel);
                        if (isFinite(pixel)) {
                            minVal = Math.min(minVal, pixel);
                            maxVal = Math.max(maxVal, pixel);
                        }
                    }
                }
                
                if (!isFinite(minVal)) minVal = 0;
                if (!isFinite(maxVal)) maxVal = 1;
                const range = maxVal - minVal || 1;
                
                console.log(`  [RENDER] Row ${reducedRow}: ${scanlineBuffer.length} scanlines, ${allPixels.length} pixels, range [${minVal.toFixed(1)}, ${maxVal.toFixed(1)}]`);
                
                // Average pixels within each reduced pixel
                let pixelValueStats = { min: Infinity, max: -Infinity, zero: 0, nonZero: 0 };
                for (let x = 0; x < reducedWidth; x++) {
                    let sum = 0, count = 0;
                    const srcXBase = x * scale;
                    
                    for (let dy = 0; dy < scanlineBuffer.length; dy++) {
                        for (let dx = 0; dx < scale; dx++) {
                            const srcX = srcXBase + dx;
                            if (srcX < scanlineBuffer[0].length) {
                                const pixel = scanlineBuffer[dy][srcX];
                                sum += isFinite(pixel) ? pixel : minVal;
                                count++;
                            }
                        }
                    }
                    
                    const avg = count > 0 ? sum / count : minVal;
                    const normalized01 = this.normalize(avg, minVal, maxVal);
                    const normalized8bit = Math.floor(normalized01 * 255);
                    
                    pixelValueStats.min = Math.min(pixelValueStats.min, normalized8bit);
                    pixelValueStats.max = Math.max(pixelValueStats.max, normalized8bit);
                    if (normalized8bit === 0) pixelValueStats.zero++;
                    else pixelValueStats.nonZero++;
                    
                    const idx = x * 4;
                    imageData.data[idx] = normalized8bit;
                    imageData.data[idx + 1] = normalized8bit;
                    imageData.data[idx + 2] = normalized8bit;
                    imageData.data[idx + 3] = 255;
                }
                
                // Check if this row is all zeros (would show as black, not grey!)
                if (pixelValueStats.zero === reducedWidth) {
                    console.warn(`  [RENDER] ⚠️ Row ${reducedRow} is ALL BLACK (normalized 0)! Raw range was [${minVal.toFixed(1)}, ${maxVal.toFixed(1)}]`);
                } else if (pixelValueStats.nonZero === 0) {
                    console.warn(`  [RENDER] ⚠️ Row ${reducedRow} has only non-8bit pixels: ${pixelValueStats}`);
                } else {
                    console.log(`  [RENDER] Row ${reducedRow} pixels: ${pixelValueStats.zero} zeros, ${pixelValueStats.nonZero} nonzero, normalized range [${pixelValueStats.min}, ${pixelValueStats.max}]`);
                }
                
                // Write to canvas
                ctx.putImageData(imageData, 0, reducedRow);
                console.log(`  [CANVAS] Wrote row ${reducedRow} to canvas at Y=${reducedRow}`);
            }

            async readPixelDataAsync(bitpix, width, height, onProgress) {
                const startTime = performance.now();
                
                const bytesPerPixel = Math.abs(bitpix) / 8;
                const totalPixels = width * height;
                const totalBytes = bytesPerPixel * totalPixels;
                const bytesPerScanline = width * bytesPerPixel;

                console.log(`[RENDERER] readPixelDataAsync started: ${width}×${height} (${totalPixels} pixels, BITPIX=${bitpix})`);

                let offset = this.hdu.rawDataOffset;
                const pixelArray = new Float32Array(totalPixels);

                console.log(`[RENDERER] Buffer size: ${(this.buffer.byteLength / 1024 / 1024).toFixed(2)} MB, data offset: ${offset}, needs: ${(totalBytes / 1024 / 1024).toFixed(2)} MB`);

                // Process scanline by scanline
                for (let row = 0; row < height; row++) {
                    const scanlineStart = offset + row * bytesPerScanline;
                    const scanlineEnd = scanlineStart + bytesPerScanline;
                    
                    // Wait for this scanline's data to be available
                    while (this.buffer.byteLength < scanlineEnd && this.result) {
                        // Update buffer reference first
                        if (this.result && this.result.fullBuffer) {
                            this.buffer = this.result.fullBuffer;
                        }
                        // Check again after update
                        if (this.buffer.byteLength >= scanlineEnd) break;
                        // Only sleep if still not available
                        await new Promise(resolve => setTimeout(resolve, 10));
                    }
                    
                    // Read this scanline's pixels
                    for (let col = 0; col < width; col++) {
                        const pixelIndex = row * width + col;
                        const pixelOffset = scanlineStart + col * bytesPerPixel;
                        
                        if (pixelOffset + bytesPerPixel <= this.buffer.byteLength) {
                            pixelArray[pixelIndex] = this.readPixel(bitpix, pixelOffset);
                        } else {
                            pixelArray[pixelIndex] = 0; // Out of bounds, fill with 0
                        }
                    }
                    
                    if (onProgress && row % 10 === 0) {  // Only report every 10 scanlines
                        this.progress = (row + 1) / height;
                        onProgress(Math.min(this.progress, 0.9), `Reading scanline ${row + 1}/${height}...`);
                    }

                    // Yield to browser every 50 scanlines
                    if (row % 50 === 0) {
                        await new Promise(resolve => setTimeout(resolve, 0));
                    }
                }

                const elapsed = performance.now() - startTime;
                console.log(`[RENDERER] readPixelDataAsync completed in ${elapsed.toFixed(0)}ms`);
                return pixelArray;
            }

            readPixel(bitpix, offset) {
                const bytesPerPixel = Math.abs(bitpix) / 8;
                
                // Validate offset is within bounds
                if (offset < 0 || offset + bytesPerPixel > this.buffer.byteLength) {
                    console.error(`readPixel: offset ${offset} out of bounds (buffer size: ${this.buffer.byteLength}, needs: ${bytesPerPixel} bytes)`);
                    return 0;
                }

                const view = new DataView(this.buffer.buffer, this.buffer.byteOffset + offset);

                try {
                    switch (bitpix) {
                        case 8:  // unsigned byte
                            return view.getUint8(0);
                        case 16: // signed short (big-endian)
                            return view.getInt16(0, false);
                        case 32: // signed long (big-endian)
                            return view.getInt32(0, false);
                        case -32: // float (big-endian)
                            return view.getFloat32(0, false);
                        case -64: // double (big-endian)
                            return view.getFloat64(0, false);
                        default:
                            console.warn(`Unsupported BITPIX: ${bitpix}`);
                            return 0;
                    }
                } catch (err) {
                    console.error(`readPixel error at offset ${offset}:`, err);
                    return 0;
                }
            }

            async resampleAsync(pixelData, width, height, onProgress) {
                const startTime = performance.now();
                console.log(`[RENDERER] resampleAsync started: ${width}×${height} → ${Math.floor(width / 4)}×${Math.floor(height / 4)}`);
                
                // For very large images (>10MP), use 1/8 linear to speed up processing
                const scale = (width * height > 10000000) ? 8 : 4;
                const newWidth = Math.floor(width / scale);
                const newHeight = Math.floor(height / scale);
                const sampledData = new Float32Array(newWidth * newHeight);

                const chunkHeight = Math.max(1, Math.floor(newHeight / 50)); // ~50 updates
                let processed = 0;

                for (let y = 0; y < newHeight; y += chunkHeight) {
                    const yEnd = Math.min(y + chunkHeight, newHeight);
                    
                    for (let yy = y; yy < yEnd; yy++) {
                        const yOffset = yy * newWidth;
                        const srcYBase = yy * scale;
                        
                        for (let x = 0; x < newWidth; x++) {
                            // Average 4x4 block
                            let sum = 0;
                            let count = 0;
                            const srcXBase = x * scale;

                            for (let dy = 0; dy < scale; dy++) {
                                const srcY = srcYBase + dy;
                                if (srcY < height) {
                                    const lineOffset = srcY * width;
                                    for (let dx = 0; dx < scale; dx++) {
                                        const srcX = srcXBase + dx;
                                        if (srcX < width) {
                                            sum += pixelData[lineOffset + srcX];
                                            count++;
                                        }
                                    }
                                }
                            }

                            sampledData[yOffset + x] = count > 0 ? sum / count : 0;
                        }
                    }

                    processed += yEnd - y;
                    if (onProgress) {
                        this.progress = 0.9 + (processed / newHeight) * 0.09;
                        onProgress(this.progress, 'Resampling...');
                    }

                    await new Promise(resolve => setTimeout(resolve, 0));
                }

                const elapsed = performance.now() - startTime;
                console.log(`[RENDERER] resampleAsync completed in ${elapsed.toFixed(0)}ms`);
                return { data: sampledData, width: newWidth, height: newHeight };
            }

            normalizePixelData(pixelData, width, height) {
                // Find min/max for normalization
                let min = Infinity, max = -Infinity;
                for (let i = 0; i < pixelData.length; i++) {
                    const val = pixelData[i];
                    if (isFinite(val)) {
                        min = Math.min(min, val);
                        max = Math.max(max, val);
                    }
                }

                const range = max - min || 1;
                const normalized = new Uint8ClampedArray(width * height * 4);

                for (let i = 0; i < pixelData.length; i++) {
                    const val = isFinite(pixelData[i]) ? pixelData[i] : min;
                    const normalized01 = this.normalize(val, min, max);
                    const normalized8bit = Math.floor(normalized01 * 255);
                    
                    const idx = i * 4;
                    normalized[idx] = normalized8bit;     // R
                    normalized[idx + 1] = normalized8bit; // G
                    normalized[idx + 2] = normalized8bit; // B
                    normalized[idx + 3] = 255;            // A
                }

                return normalized;
            }

            createCanvasImage(imageData, width, height) {
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                
                const ctx = canvas.getContext('2d');
                const imgData = ctx.createImageData(width, height);
                imgData.data.set(imageData);
                ctx.putImageData(imgData, 0, 0);

                return canvas;
            }

            getCanvas() {
                return this.canvas;
            }
        }

        // Body becomes the drag zone
        document.body.addEventListener('dragover', (e) => {
            e.preventDefault();
            document.body.classList.add('dragover');
        });

        document.body.addEventListener('dragleave', (e) => {
            if (e.target === document.body) {
                document.body.classList.remove('dragover');
            }
        });

        document.body.addEventListener('drop', (e) => {
            e.preventDefault();
            document.body.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        // File input button
        const fileInputLabel = document.querySelector('.file-input-label');
        if (fileInputLabel) {
            fileInputLabel.addEventListener('click', () => fileInput.click());
        }

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        // Normalization controls
        const normSelect = document.getElementById('normSelect');
        const asinhScale = document.getElementById('asinhScale');
        const asinhScaleValue = document.getElementById('asinhScaleValue');
        const asinhControls = document.getElementById('asinhControls');
        
        // Update scale value display and trigger re-render
        if (asinhScale && asinhScaleValue) {
            asinhScale.addEventListener('input', (e) => {
                const newScale = parseFloat(e.target.value);
                asinhScaleValue.textContent = newScale.toFixed(2);
                
                // Re-render all active images with new scale
                const currentNorm = normSelect?.value || 'asinh';
                activeRenderers.forEach(renderer => {
                    renderer.reRenderWithNormalization(currentNorm, newScale);
                });
            });
        }
        
        // Show/hide asinh controls and trigger re-render on method change
        if (normSelect && asinhControls) {
            const updateAsinhControlsVisibility = () => {
                asinhControls.style.display = normSelect.value === 'asinh' ? 'flex' : 'none';
            };
            updateAsinhControlsVisibility();
            
            normSelect.addEventListener('change', () => {
                updateAsinhControlsVisibility();
                
                // Re-render all active images with new normalization method
                const newNorm = normSelect.value;
                const currentScale = parseFloat(asinhScale?.value || 1.0);
                activeRenderers.forEach(renderer => {
                    renderer.reRenderWithNormalization(newNorm, currentScale);
                });
            });
        }

        function handleFiles(files) {
            selectedFiles = Array.from(files).filter(f => 
                f.name.toLowerCase().match(/\.(fits|fit|fts)$/)
            );

            if (selectedFiles.length === 0) {
                alert('Please select valid FITS files (.fits, .fit, or .fts)');
                return;
            }

            // Auto-parse if single file, otherwise show actions
            if (selectedFiles.length === 1) {
                actions.style.display = 'none';
                parseFiles();
            } else {
                updateFileList();
                actions.style.display = 'flex';
                results.style.display = 'none';
            }
        }

        function updateFileList() {
            fileItems.innerHTML = selectedFiles.map((file, index) => `
                <div class="file-item">
                    <div>
                        <div class="file-name">${file.name}</div>
                        <div class="file-status">${(file.size / 1024 / 1024).toFixed(2)} MB</div>
                    </div>
                </div>
            `).join('');

            fileList.style.display = selectedFiles.length > 0 ? 'block' : 'none';
        }

        async function parseFiles() {
            if (selectedFiles.length === 0) return;

            parseBtn.disabled = true;
            parseBtn.innerHTML = '<span class="spinner"></span>Parsing...';
            resultItems.innerHTML = '';
            activeRenderers = []; // Clear old renderers when parsing new files
            imagePane.innerHTML = '<div style="color: #999; font-size: 14px;">Image previews will appear here</div>';
            progressContainer.classList.add('active');

            try {
                for (let fileIndex = 0; fileIndex < selectedFiles.length; fileIndex++) {
                    const file = selectedFiles[fileIndex];
                    const progress = ((fileIndex + 0.5) / selectedFiles.length) * 100;
                    progressLabel.textContent = `Parsing headers: ${file.name}`;
                    progressBar.style.width = `${Math.min(progress, 99)}%`;
                    progressBar.textContent = `${Math.round(Math.min(progress, 99))}%`;

                    try {
                        // Parse headers incrementally first (they're at the start of the file)
                        const result = await parseFileIncrementally(file, (loadProgress) => {
                            const overallProgress = ((fileIndex + loadProgress) / selectedFiles.length) * 100;
                            progressLabel.textContent = `Loading pixel data: ${file.name}`;
                            progressBar.style.width = `${Math.min(overallProgress, 99)}%`;
                            progressBar.textContent = `${Math.round(Math.min(overallProgress, 99))}%`;
                        });

                        if (!result.success) {
                            displayResult({
                                fileName: file.name,
                                error: result.error || 'Unknown error'
                            });
                        } else {
                            displayResult({
                                fileName: file.name,
                                data: result,
                                file: file
                            });
                        }
                    } catch (err) {
                        displayResult({
                            fileName: file.name,
                            error: err.message
                        });
