<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Compass & Elevation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            color: white;
            overflow-y: auto;
        }

        .container {
            max-width: 500px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .compass-container {
            position: relative;
            width: 100%;
            max-width: 350px;
            aspect-ratio: 1;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        #compassCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .readings {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .reading-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .reading-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .reading-value {
            font-size: 36px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .reading-unit {
            font-size: 18px;
            opacity: 0.8;
            margin-top: 5px;
        }

        .status {
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            font-size: 14px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .btn-request {
            background: rgba(255, 255, 255, 0.9);
            color: #1e3c72;
            border: none;
            border-radius: 25px;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .btn-request:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 7px 25px rgba(0,0,0,0.3);
        }

        .btn-request:active {
            transform: translateY(0);
        }

        #permissionSection {
            text-align: center;
            display: none;
        }

        .error {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.2);
        }

        .success {
            color: #51cf66;
            background: rgba(81, 207, 102, 0.2);
        }

        .direction {
            font-size: 20px;
            margin-top: 5px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 XCompass & Elevation</h1>
        </div>

        <div id="permissionSection">
            <button class="btn-request" onclick="requestPermission()">Enable Sensors</button>
            <p style="margin-top: 15px; font-size: 14px; opacity: 0.9;">
                Tap to enable device orientation sensors
            </p>
        </div>

        <div class="compass-container">
            <canvas id="compassCanvas" width="700" height="700"></canvas>
        </div>

        <div class="readings">
            <div class="reading-card">
                <div class="reading-label">Azimuth (Heading)</div>
                <div class="reading-value" id="headingValue">--</div>
                <div class="reading-unit">degrees</div>
                <div class="direction" id="headingDirection">--</div>
            </div>
            <div class="reading-card">
                <div class="reading-label">Elevation (Tilt)</div>
                <div class="reading-value" id="elevationValue">--</div>
                <div class="reading-unit">degrees</div>
                <div class="direction" id="elevationDirection">--</div>
            </div>
        </div>

        <div class="reading-card" style="margin-top: 15px;">
            <div class="reading-label">Raw Sensor Data</div>
            <div id="rawData" style="font-size: 14px; font-family: monospace; line-height: 1.8;">
                <div>alpha: <span id="alphaValue">--</span>°</div>
                <div>beta: <span id="betaValue">--</span>°</div>
                <div>gamma: <span id="gammaValue">--</span>°</div>
                <div>webkitCompassHeading: <span id="webkitValue">--</span>°</div>
                <div>screenOrientation: <span id="orientValue">--</span>°</div>
                <div>isAbsolute: <span id="absoluteValue">--</span></div>
            </div>
        </div>

        <div class="status" id="statusMessage">
            Initializing...
        </div>
    </div>

    <script>
        let compassHeading = 0;
        let elevationAngle = 0;
        let isAbsolute = false;
        let canvas, ctx;
        let animationId;
        let screenOrientation = 0; // 0, 90, -90, 180
        let rawAlpha = 0;
        let rawBeta = 0;
        let rawGamma = 0;
        let rawWebkit = null;
        
        // Detect iOS
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        // Initialize
        window.addEventListener('load', () => {
            canvas = document.getElementById('compassCanvas');
            ctx = canvas.getContext('2d');
            checkPermissions();
            startRendering();
            trackOrientation();
        });
        
        // Track screen orientation changes
        function trackOrientation() {
            function updateOrientation() {
                let angle = 0;
                
                if (screen.orientation) {
                    // Modern API - returns 0, 90, 180, 270
                    angle = screen.orientation.angle;
                } else if (window.orientation !== undefined) {
                    // Legacy API - returns 0, 90, -90, 180
                    // @ts-ignore - window.orientation is deprecated but required for older iOS
                    angle = window.orientation;
                }
                
                // Normalize to modern standard: Convert -90 to 270
                // Both represent landscape-right (device rotated clockwise when in portrait)
                if (angle === -90) {
                    angle = 270;
                }
                
                screenOrientation = angle;
            }
            
            updateOrientation();
            
            // Listen for orientation changes
            if (screen.orientation) {
                screen.orientation.addEventListener('change', updateOrientation);
            } else {
                // @ts-ignore - orientationchange is deprecated but required for older iOS
                window.addEventListener('orientationchange', updateOrientation);
            }
        }

        async function checkPermissions() {
            // Check if we need to request permission (iOS 13+)
            if (typeof DeviceOrientationEvent !== 'undefined' && 
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                document.getElementById('permissionSection').style.display = 'block';
                updateStatus('Tap "Enable Sensors" to start', false);
            } else {
                // Android or older iOS - start directly
                startListening();
            }
        }

        async function requestPermission() {
            try {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission === 'granted') {
                    document.getElementById('permissionSection').style.display = 'none';
                    startListening();
                } else {
                    updateStatus('Permission denied. Please allow sensor access.', true);
                }
            } catch (error) {
                updateStatus('Error requesting permission: ' + error.message, true);
            }
        }

        function startListening() {
            if (!window.DeviceOrientationEvent) {
                updateStatus('Device orientation not supported on this device.', true);
                return;
            }
            
            // iOS: uses deviceorientation with webkitCompassHeading
            // Android: uses deviceorientationabsolute with absolute flag
            if (isIOS) {
                window.addEventListener('deviceorientation', handleOrientation, true);
                updateStatus('Starting compass (iOS)...', false);
            } else {
                // For Android, listen to deviceorientationabsolute
                window.addEventListener('deviceorientationabsolute', handleOrientation, true);
                updateStatus('Starting compass (Android)...', false);
            }
            
            // Listen for compass calibration needs
            window.addEventListener('compassneedscalibration', (e) => {
                updateStatus('⚠️ Compass needs calibration - wave phone in figure 8', true);
                e.preventDefault();
            }, true);
            
            setTimeout(() => {
                if (compassHeading === 0 && elevationAngle === 0) {
                    updateStatus('⚠️ No sensor data received. Ensure sensors are enabled.', true);
                }
            }, 3000);
        }

        function handleOrientation(event) {
            // Store raw values
            rawAlpha = event.alpha !== null ? event.alpha : 0;
            rawBeta = event.beta !== null ? event.beta : 0;
            rawGamma = event.gamma !== null ? event.gamma : 0;
            rawWebkit = event.webkitCompassHeading !== undefined ? event.webkitCompassHeading : null;
            
            // Check if we have absolute orientation
            isAbsolute = event.absolute === true || event.type === 'deviceorientationabsolute';
            
            let rawHeading = 0;
            let useWebkitHeading = false;
            
            // iOS: webkitCompassHeading gives true heading (0-360, 0 = North)
            // Note: webkitCompassHeading already accounts for screen orientation on iOS
            if (event.webkitCompassHeading !== undefined && event.webkitCompassHeading !== null) {
                rawHeading = event.webkitCompassHeading;
                useWebkitHeading = true;
                isAbsolute = true;
                updateStatus('✓ Active (iOS)', false);
            } 
            // Android with absolute orientation
            else if (event.alpha !== null && event.beta !== null && event.gamma !== null) {
                // Formula that works in any device orientation (flat, upright, tilted)
                // This accounts for device tilt using beta and gamma
                rawHeading = -(rawAlpha + rawBeta * rawGamma / 90);
                // Normalize to [0, 360) range
                rawHeading = rawHeading - Math.floor(rawHeading / 360) * 360;
                
                if (isAbsolute) {
                    updateStatus('✓ Active (absolute)', false);
                } else {
                    updateStatus('⚠️ Relative heading - needs device calibration', true);
                }
            }
            
            // Adjust heading based on screen orientation
            // webkitCompassHeading gives the direction the DEVICE top is pointing
            // We need to adjust it to show the direction the SCREEN top is pointing
            // screenOrientation: 0 (portrait), 90 (landscape-left), 270 (landscape-right), 180 (upside down)
            compassHeading = (rawHeading + screenOrientation + 360) % 360;
            
            // Calculate elevation using simple gamma correction
            // Gamma goes 0 to -90 then 90 to 0
            let correctedElevation = rawGamma;
            if (screenOrientation === 90) {
                // Landscape-left
                if (rawGamma < 0) {
                    correctedElevation = -rawGamma;
                } else {
                    correctedElevation = 180 - rawGamma;
                }
            } else if (screenOrientation === 270) {
                // Landscape-right (inverted)
                if (rawGamma < 0) {
                    correctedElevation = 180 - (-rawGamma);
                } else {
                    correctedElevation = rawGamma;
                }
            } else {
                // Portrait mode (0° or 180°) - use beta
                correctedElevation = rawBeta;
            }
            elevationAngle = correctedElevation;
            
            updateReadings();
        }

        function updateReadings() {
            // Update heading
            const heading = Math.round(compassHeading);
            document.getElementById('headingValue').textContent = heading;
            document.getElementById('headingDirection').textContent = getCardinalDirection(heading);
            
            // Update elevation (pitch)
            const elevation = Math.round(elevationAngle);
            document.getElementById('elevationValue').textContent = elevation;
            document.getElementById('elevationDirection').textContent = getElevationDescription(elevation);
            
            // Update raw sensor data
            document.getElementById('alphaValue').textContent = rawAlpha.toFixed(1);
            document.getElementById('betaValue').textContent = rawBeta.toFixed(1);
            document.getElementById('gammaValue').textContent = rawGamma.toFixed(1);
            document.getElementById('webkitValue').textContent = rawWebkit !== null ? rawWebkit.toFixed(1) : 'N/A';
            document.getElementById('orientValue').textContent = screenOrientation;
            document.getElementById('absoluteValue').textContent = isAbsolute ? 'Yes' : 'No';
        }

        function getCardinalDirection(degrees) {
            const directions = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 
                              'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
            const index = Math.round(degrees / 22.5) % 16;
            return directions[index];
        }

        function getElevationDescription(degrees) {
            if (degrees < -60) return 'Face Up';
            if (degrees < -30) return 'Tilted Up';
            if (degrees < -10) return 'Slightly Up';
            if (degrees < 10) return 'Level';
            if (degrees < 30) return 'Slightly Down';
            if (degrees < 60) return 'Tilted Down';
            return 'Face Down';
        }

        function updateStatus(message, isError) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = 'status ' + (isError ? 'error' : 'success');
        }

        // Rendering
        function startRendering() {
            function render() {
                drawCompass();
                animationId = requestAnimationFrame(render);
            }
            render();
        }

        function drawCompass() {
            const size = canvas.width;
            const center = size / 2;
            const radius = size * 0.4;
            
            // Clear
            ctx.clearRect(0, 0, size, size);
            
            // Save context
            ctx.save();
            ctx.translate(center, center);
            
            // Rotate based on heading (counter-clockwise to keep North at top)
            ctx.rotate(-compassHeading * Math.PI / 180);
            
            // Draw outer circle
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, 0, radius, 0, 2 * Math.PI);
            ctx.stroke();
            
            // Draw cardinal directions
            ctx.fillStyle = 'white';
            ctx.font = 'bold 48px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            const directions = [
                { label: 'N', angle: 0, color: '#ff6b6b' },
                { label: 'E', angle: 90, color: 'white' },
                { label: 'S', angle: 180, color: 'white' },
                { label: 'W', angle: 270, color: 'white' }
            ];
            
            directions.forEach(dir => {
                ctx.save();
                ctx.rotate(dir.angle * Math.PI / 180);
                ctx.fillStyle = dir.color;
                ctx.fillText(dir.label, 0, -radius * 0.75);
                ctx.restore();
            });
            
            // Draw degree markers
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 2;
            for (let i = 0; i < 360; i += 10) {
                ctx.save();
                ctx.rotate(i * Math.PI / 180);
                ctx.beginPath();
                const length = i % 30 === 0 ? 30 : 15;
                ctx.moveTo(0, -radius);
                ctx.lineTo(0, -radius + length);
                ctx.stroke();
                ctx.restore();
            }
            
            // Draw North arrow (always pointing up in rotated context)
            ctx.fillStyle = '#ff6b6b';
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, -radius * 0.5);  // Top point
            ctx.lineTo(-20, -radius * 0.2); // Left point
            ctx.lineTo(0, -radius * 0.3);   // Center notch
            ctx.lineTo(20, -radius * 0.2);  // Right point
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            
            // Draw center circle
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.beginPath();
            ctx.arc(0, 0, 15, 0, 2 * Math.PI);
            ctx.fill();
            
            ctx.restore();
            
            // Draw elevation indicator
            drawElevationIndicator(center, radius);
        }

        function drawElevationIndicator(center, radius) {
            const x = center + radius * 1.3;
            const y = center;
            const barHeight = radius * 1.5;
            const barWidth = 40;
            
            // Draw background bar
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.fillRect(x - barWidth / 2, y - barHeight / 2, barWidth, barHeight);
            
            // Draw elevation marker
            const normalizedElevation = Math.max(-90, Math.min(90, elevationAngle));
            const markerY = y - (normalizedElevation / 90) * (barHeight / 2) * 0.8;
            
            ctx.fillStyle = '#4dabf7';
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(x, markerY, 15, 0, 2 * Math.PI);
            ctx.fill();
            ctx.stroke();
            
            // Draw 0 degree line
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x - barWidth / 2 - 10, y);
            ctx.lineTo(x + barWidth / 2 + 10, y);
            ctx.stroke();
        }
    </script>
</body>
</html>
