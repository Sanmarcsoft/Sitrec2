<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Compass & Elevation (v2 - Shared Library)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 10px;
            color: white;
            overflow-y: auto;
        }

        .container {
            max-width: 500px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .header {
            text-align: center;
            margin-bottom: 5px;
        }

        .header h1 {
            font-size: 20px;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .instruments-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }

        .compass-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        #compassCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .horizon-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        #horizonCanvas {
            width: 100%;
            height: 100%;
        }

        .readings {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 5px;
        }

        .reading-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 8px 10px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .reading-label {
            font-size: 11px;
            opacity: 0.9;
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .reading-value {
            font-size: 36px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            line-height: 1;
        }

        .reading-unit {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 2px;
        }

        .status {
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 10px;
            font-size: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .btn-request {
            background: rgba(255, 255, 255, 0.9);
            color: #1e3c72;
            border: none;
            border-radius: 25px;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .btn-request:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 7px 25px rgba(0,0,0,0.3);
        }

        .btn-request:active {
            transform: translateY(0);
        }

        #permissionSection {
            text-align: center;
            display: none;
        }

        .error {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.2);
        }

        .success {
            color: #51cf66;
            background: rgba(81, 207, 102, 0.2);
        }

        .direction {
            font-size: 14px;
            margin-top: 2px;
            font-weight: 600;
        }

        .raw-data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 15px;
            font-size: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            line-height: 1.4;
            font-weight: 500;
        }

        .raw-data-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .raw-label {
            font-size: 16px;
            opacity: 0.8;
            margin-right: 8px;
        }

        .raw-value {
            font-weight: bold;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 Compass & Elevation v2</h1>
            <p style="font-size: 11px; opacity: 0.8;">Shared Library</p>
        </div>

        <div id="permissionSection">
            <button class="btn-request" onclick="requestPermission()">Enable Sensors</button>
            <p style="margin-top: 15px; font-size: 14px; opacity: 0.9;">
                Tap to enable device orientation sensors
            </p>
        </div>

        <div class="instruments-row">
            <div class="compass-container">
                <canvas id="compassCanvas" width="700" height="700"></canvas>
            </div>
            <div class="horizon-container">
                <canvas id="horizonCanvas" width="700" height="700"></canvas>
            </div>
        </div>

        <div class="readings">
            <div class="reading-card">
                <div class="reading-label">Azimuth (Heading)</div>
                <div class="reading-value" id="headingValue">--</div>
                <div class="reading-unit">degrees</div>
                <div class="direction" id="headingDirection">--</div>
            </div>
            <div class="reading-card">
                <div class="reading-label">Elevation (Tilt)</div>
                <div class="reading-value" id="elevationValue">--</div>
                <div class="reading-unit">degrees</div>
                <div class="direction" id="elevationDirection">--</div>
            </div>
        </div>

        <div class="reading-card" style="margin-top: 5px; padding: 10px 15px;">
            <div class="reading-label" style="margin-bottom: 8px;">Raw Sensor Data</div>
            <div class="raw-data-grid">
                <div class="raw-data-item">
                    <span class="raw-label">α:</span>
                    <span class="raw-value" id="alphaValue">--</span>
                </div>
                <div class="raw-data-item">
                    <span class="raw-label">β:</span>
                    <span class="raw-value" id="betaValue">--</span>
                </div>
                <div class="raw-data-item">
                    <span class="raw-label">γ:</span>
                    <span class="raw-value" id="gammaValue">--</span>
                </div>
                <div class="raw-data-item">
                    <span class="raw-label">wCH:</span>
                    <span class="raw-value" id="webkitValue">--</span>
                </div>
                <div class="raw-data-item">
                    <span class="raw-label">sO:</span>
                    <span class="raw-value" id="orientValue">--</span>
                </div>
                <div class="raw-data-item">
                    <span class="raw-label">isA:</span>
                    <span class="raw-value" id="absoluteValue">--</span>
                </div>
            </div>
        </div>

        <div class="status" id="statusMessage">
            Initializing...
        </div>
    </div>

    <script type="module">
        // Import the shared DeviceOrientationCompass library
        import { DeviceOrientationCompass } from '../src/DeviceOrientationCompass.js?v=2';

        // Create compass instance
        const compass = new DeviceOrientationCompass();
        
        let compassCanvas, compassCtx;
        let horizonCanvas, horizonCtx;
        let animationId;
        let compassHeading = 0;
        let elevationAngle = 0;

        // Set up compass callbacks
        compass.onUpdate = (readings) => {
            compassHeading = readings.heading;
            elevationAngle = readings.elevation;
            updateReadings(readings);
        };

        compass.onStatusChange = (message, isError) => {
            updateStatus(message, isError);
        };

        // Initialize on load
        window.addEventListener('load', async () => {
            compassCanvas = document.getElementById('compassCanvas');
            compassCtx = compassCanvas.getContext('2d');
            
            horizonCanvas = document.getElementById('horizonCanvas');
            horizonCtx = horizonCanvas.getContext('2d');
            
            await checkPermissions();
            startRendering();
        });

        async function checkPermissions() {
            // Check if we need to request permission (iOS 13+)
            if (typeof DeviceOrientationEvent !== 'undefined' && 
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                document.getElementById('permissionSection').style.display = 'block';
                updateStatus('Tap "Enable Sensors" to start', false);
            } else {
                // Android or older iOS - start directly
                startCompass();
            }
        }

        async function requestPermission() {
            const granted = await compass.requestPermission();
            if (granted) {
                document.getElementById('permissionSection').style.display = 'none';
                startCompass();
            }
        }
        
        // Make requestPermission available globally for the button onclick
        window.requestPermission = requestPermission;

        function startCompass() {
            compass.startListening();
        }

        function updateReadings(readings) {
            // Update heading
            const heading = Math.round(readings.heading);
            document.getElementById('headingValue').textContent = heading;
            document.getElementById('headingDirection').textContent = getCardinalDirection(heading);
            
            // Update elevation (pitch)
            const elevation = Math.round(readings.elevation);
            document.getElementById('elevationValue').textContent = elevation;
            document.getElementById('elevationDirection').textContent = getElevationDescription(elevation);
            
            // Update raw sensor data
            const raw = readings.raw;
            document.getElementById('alphaValue').textContent = raw.alpha.toFixed(0) + '°';
            document.getElementById('betaValue').textContent = raw.beta.toFixed(0) + '°';
            document.getElementById('gammaValue').textContent = raw.gamma.toFixed(0) + '°';
            document.getElementById('webkitValue').textContent = raw.webkit !== null ? raw.webkit.toFixed(0) + '°' : 'N/A';
            document.getElementById('orientValue').textContent = raw.screenOrientation + '°';
            document.getElementById('absoluteValue').textContent = readings.isAbsolute ? 'Y' : 'N';
        }

        function getCardinalDirection(degrees) {
            const directions = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 
                              'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
            const index = Math.round(degrees / 22.5) % 16;
            return directions[index];
        }

        function getElevationDescription(degrees) {
            if (degrees < -60) return 'Face Down';
            if (degrees < -30) return 'Tilted Down';
            if (degrees < -10) return 'Slightly Down';
            if (degrees < 10) return 'Level';
            if (degrees < 30) return 'Slightly Up';
            if (degrees < 60) return 'Tilted Up';
            return 'Face Up';
        }

        function updateStatus(message, isError) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = 'status ' + (isError ? 'error' : 'success');
        }

        // Rendering
        function startRendering() {
            function render() {
                drawCompass();
                drawArtificialHorizon();
                animationId = requestAnimationFrame(render);
            }
            render();
        }

        function drawCompass() {
            const size = compassCanvas.width;
            const center = size / 2;
            const radius = size * 0.4;
            
            // Clear
            compassCtx.clearRect(0, 0, size, size);
            
            // Save context
            compassCtx.save();
            compassCtx.translate(center, center);
            
            // Rotate based on heading (counter-clockwise to keep North at top)
            compassCtx.rotate(-compassHeading * Math.PI / 180);
            
            // Draw outer circle
            compassCtx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            compassCtx.lineWidth = 3;
            compassCtx.beginPath();
            compassCtx.arc(0, 0, radius, 0, 2 * Math.PI);
            compassCtx.stroke();
            
            // Draw cardinal directions
            compassCtx.fillStyle = 'white';
            compassCtx.font = 'bold 48px sans-serif';
            compassCtx.textAlign = 'center';
            compassCtx.textBaseline = 'middle';
            
            const directions = [
                { label: 'N', angle: 0, color: '#ff6b6b' },
                { label: 'E', angle: 90, color: 'white' },
                { label: 'S', angle: 180, color: 'white' },
                { label: 'W', angle: 270, color: 'white' }
            ];
            
            directions.forEach(dir => {
                compassCtx.save();
                compassCtx.rotate(dir.angle * Math.PI / 180);
                compassCtx.fillStyle = dir.color;
                compassCtx.fillText(dir.label, 0, -radius * 0.75);
                compassCtx.restore();
            });
            
            // Draw degree markers
            compassCtx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            compassCtx.lineWidth = 2;
            for (let i = 0; i < 360; i += 10) {
                compassCtx.save();
                compassCtx.rotate(i * Math.PI / 180);
                compassCtx.beginPath();
                const length = i % 30 === 0 ? 30 : 15;
                compassCtx.moveTo(0, -radius);
                compassCtx.lineTo(0, -radius + length);
                compassCtx.stroke();
                compassCtx.restore();
            }
            
            // Draw North arrow (always pointing up in rotated context)
            compassCtx.fillStyle = '#ff6b6b';
            compassCtx.strokeStyle = 'white';
            compassCtx.lineWidth = 4;
            compassCtx.beginPath();
            compassCtx.moveTo(0, -radius * 0.5);  // Top point
            compassCtx.lineTo(-20, -radius * 0.2); // Left point
            compassCtx.lineTo(0, -radius * 0.3);   // Center notch
            compassCtx.lineTo(20, -radius * 0.2);  // Right point
            compassCtx.closePath();
            compassCtx.fill();
            compassCtx.stroke();
            
            // Draw center circle
            compassCtx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            compassCtx.beginPath();
            compassCtx.arc(0, 0, 15, 0, 2 * Math.PI);
            compassCtx.fill();
            
            compassCtx.restore();
        }

        function drawArtificialHorizon() {
            const size = horizonCanvas.width;
            const center = size / 2;
            
            // Clear
            horizonCtx.clearRect(0, 0, size, size);
            
            horizonCtx.save();
            horizonCtx.translate(center, center);
            
            // Calculate pitch offset (elevation angle affects vertical position)
            // Normalize to pixels: 1 degree = size/180 pixels
            const pitchOffset = (elevationAngle * size) / 180;
            
            // Draw sky (upper half - blue)
            horizonCtx.fillStyle = '#4a90e2';
            horizonCtx.fillRect(-center, -center - pitchOffset, size, center + pitchOffset);
            
            // Draw ground (lower half - brown)
            horizonCtx.fillStyle = '#8b6f47';
            horizonCtx.fillRect(-center, -pitchOffset, size, center + pitchOffset);
            
            // Draw horizon line
            horizonCtx.strokeStyle = 'white';
            horizonCtx.lineWidth = 4;
            horizonCtx.beginPath();
            horizonCtx.moveTo(-center, -pitchOffset);
            horizonCtx.lineTo(center, -pitchOffset);
            horizonCtx.stroke();
            
            // Draw pitch ladder lines (every 10 degrees)
            horizonCtx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
            horizonCtx.lineWidth = 2;
            horizonCtx.font = 'bold 24px sans-serif';
            horizonCtx.textAlign = 'center';
            horizonCtx.textBaseline = 'middle';
            horizonCtx.fillStyle = 'white';
            
            for (let pitch = -90; pitch <= 90; pitch += 10) {
                if (pitch === 0) continue; // Skip horizon line
                
                const yPos = -pitchOffset - (pitch * size) / 180;
                
                // Only draw if visible
                if (Math.abs(yPos) < center) {
                    const lineLength = Math.abs(pitch) % 30 === 0 ? 120 : 80;
                    
                    horizonCtx.beginPath();
                    horizonCtx.moveTo(-lineLength / 2, yPos);
                    horizonCtx.lineTo(lineLength / 2, yPos);
                    horizonCtx.stroke();
                    
                    // Draw pitch value
                    if (Math.abs(pitch) % 30 === 0) {
                        const label = Math.abs(pitch).toString();
                        horizonCtx.fillText(label, -lineLength / 2 - 30, yPos);
                        horizonCtx.fillText(label, lineLength / 2 + 30, yPos);
                    }
                }
            }
            
            // Draw center aircraft symbol (fixed reference)
            horizonCtx.strokeStyle = '#ffcc00';
            horizonCtx.lineWidth = 6;
            horizonCtx.fillStyle = '#ffcc00';
            
            // Center dot
            horizonCtx.beginPath();
            horizonCtx.arc(0, 0, 8, 0, 2 * Math.PI);
            horizonCtx.fill();
            
            // Wings
            horizonCtx.beginPath();
            horizonCtx.moveTo(-100, 0);
            horizonCtx.lineTo(-30, 0);
            horizonCtx.moveTo(30, 0);
            horizonCtx.lineTo(100, 0);
            horizonCtx.stroke();
            
            // Wing tips down
            horizonCtx.beginPath();
            horizonCtx.moveTo(-100, 0);
            horizonCtx.lineTo(-100, 20);
            horizonCtx.moveTo(100, 0);
            horizonCtx.lineTo(100, 20);
            horizonCtx.stroke();
            
            // Draw border circle
            horizonCtx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            horizonCtx.lineWidth = 3;
            horizonCtx.beginPath();
            horizonCtx.arc(0, 0, center * 0.95, 0, 2 * Math.PI);
            horizonCtx.stroke();
            
            horizonCtx.restore();
        }
    </script>
</body>
</html>
